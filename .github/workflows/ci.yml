name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.3
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json
            container/agent-runner/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix web ci
          npm --prefix container/agent-runner ci

      - name: Check changed-file formatting
        run: npm run format:check
        env:
          FORMAT_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Verify generated type sources
        run: |
          make sync-types
          git diff --exit-code -- shared/stream-event.ts src/stream-event.types.ts web/src/stream-event.types.ts container/agent-runner/src/stream-event.types.ts
          npx prettier --check shared/stream-event.ts src/stream-event.types.ts web/src/stream-event.types.ts container/agent-runner/src/stream-event.types.ts

      - name: Typecheck
        run: make typecheck

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build:all

      - name: Agent runner self-test
        run: npm run self-test:agent-runner
